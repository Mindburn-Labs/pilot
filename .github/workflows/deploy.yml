name: Deploy

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Release gates
        run: npm run test:release

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: mindburn-labs/pilot
      WEB_IMAGE_NAME: mindburn-labs/pilot-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy vulnerability scan (web)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.tag.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy-staging:
    needs: docker
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write DigitalOcean env files
        run: |
          printf '%s\n' "${{ secrets.DO_ENV_SHARED }}" > .env.production.shared
          printf '%s\n' "${{ secrets.DO_ENV_HELM }}" > .env.production.helm
          printf '%s\n' "${{ secrets.DO_ENV_PILOT }}" > .env.production.pilot
          {
            echo "PILOT_IMAGE=ghcr.io/mindburn-labs/pilot:${GITHUB_REF_NAME}"
            echo "WEB_IMAGE=ghcr.io/mindburn-labs/pilot-web:${GITHUB_REF_NAME}"
          } >> .env.production.shared

      - name: Deploy to DigitalOcean staging
        env:
          DO_DROPLET_IP: ${{ vars.DO_DROPLET_IP }}
          DO_REMOTE_USER: ${{ vars.DO_REMOTE_USER || 'root' }}
          DO_REMOTE_DIR: ${{ vars.DO_REMOTE_DIR || '/opt/pilot/current' }}
        run: bash infra/digitalocean/deploy.sh deploy

      - name: Production-like smoke
        env:
          HELM_FAIL_CLOSED: '1'
        run: bash infra/digitalocean/deploy.sh smoke

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write DigitalOcean env files
        run: |
          printf '%s\n' "${{ secrets.DO_ENV_SHARED }}" > .env.production.shared
          printf '%s\n' "${{ secrets.DO_ENV_HELM }}" > .env.production.helm
          printf '%s\n' "${{ secrets.DO_ENV_PILOT }}" > .env.production.pilot
          {
            echo "PILOT_IMAGE=ghcr.io/mindburn-labs/pilot:${GITHUB_REF_NAME}"
            echo "WEB_IMAGE=ghcr.io/mindburn-labs/pilot-web:${GITHUB_REF_NAME}"
          } >> .env.production.shared

      - name: Deploy to DigitalOcean production
        env:
          DO_DROPLET_IP: ${{ vars.DO_DROPLET_IP }}
          DO_REMOTE_USER: ${{ vars.DO_REMOTE_USER || 'root' }}
          DO_REMOTE_DIR: ${{ vars.DO_REMOTE_DIR || '/opt/pilot/current' }}
        run: bash infra/digitalocean/deploy.sh deploy

      - name: Production smoke
        env:
          HELM_FAIL_CLOSED: '1'
          SMOKE_TOKEN: ${{ secrets.PRODUCTION_SMOKE_TOKEN }}
          SMOKE_WORKSPACE_ID: ${{ vars.PRODUCTION_SMOKE_WORKSPACE_ID }}
          SMOKE_TASK_ID: ${{ vars.PRODUCTION_SMOKE_TASK_ID }}
        run: bash infra/digitalocean/deploy.sh smoke
