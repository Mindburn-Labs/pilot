name: Claude Code async review

# Runs /review (or /ultrareview when the needs-ultrareview label is set) via
# the Claude Code GitHub Action. Opus 4.7, effort=high.
# Enforces Pilot's invariants: every autonomous action through
# packages/helm-client, Scrapling-first ingestion, Drizzle-only DB access.
# See docs/ai/ultrareview-policy.md in the monorepo root.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve review mode
        id: mode
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if printf '%s' "$LABELS" | grep -q '"name": *"needs-ultrareview"'; then
            echo "command=/ultrareview" >> "$GITHUB_OUTPUT"
          else
            echo "command=/review" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Invoke the HELM PR preflight workflow on this PR in the Pilot repo.

            1. Run the project's `helm-pr-preflight` skill scoped to Pilot.
            2. Enforce these invariants specifically:
               - Every autonomous action must route through `packages/helm-client`; flag any out-of-band call.
               - Ingestion must use Scrapling; flag any raw `fetch`, `axios`, or `puppeteer` use inside `services/` or `pipelines/`.
               - Database access must use Drizzle; flag any raw SQL outside `packages/db/migrations`.
               - Every inbound/outbound payload must be Zod-validated via `packages/shared`.
               - Vendored legacy imports must not be reintroduced into the active repo.
            3. If the PR has the `needs-ultrareview` label, run `/ultrareview` (remote sandbox, parallel reviewer fleet) instead of `/review`.
            4. Post the consolidated verdict as a PR comment. Block merge via a review-request-changes comment on any CRITICAL finding, failing test, kernel-guardian escalation, or invariant violation above.

            Mode: ${{ steps.mode.outputs.command }}
          claude_args: '--model claude-opus-4-7 --effort high'
