name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write # for SLSA provenance via OIDC
  attestations: write # for attest-build-provenance
  security-events: write # for SARIF upload

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Build + push. BuildKit emits both SBOM and provenance attestations
      # inline (mode=max). CycloneDX format is security-tool-friendly.
      - name: Build and push multi-arch image (with attestations)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/mindburn-labs/pilot:${{ steps.tag.outputs.version }}
            ghcr.io/mindburn-labs/pilot:latest
            ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/pilot:{1}', vars.DOCKERHUB_USERNAME, steps.tag.outputs.version) || '' }}
            ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/pilot:latest', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push multi-arch web image (with attestations)
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/mindburn-labs/pilot-web:${{ steps.tag.outputs.version }}
            ghcr.io/mindburn-labs/pilot-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Standalone CycloneDX SBOM attached to the GitHub Release (on top of
      # the BuildKit-embedded one, so downstream scanners that can't read
      # image attestations still get a machine-readable SBOM).
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/mindburn-labs/pilot:${{ steps.tag.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # SLSA L3 provenance attestation — ties the image digest to the
      # commit SHA + workflow identity. Signed by the Sigstore transparency
      # log (rekor).
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/mindburn-labs/pilot
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate web image SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/mindburn-labs/pilot-web
          subject-digest: ${{ steps.build-web.outputs.digest }}
          push-to-registry: true

      # Vulnerability scan: fail the release on HIGH or CRITICAL CVEs so we
      # don't ship an image with known exploitable paths.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/mindburn-labs/pilot:${{ steps.tag.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy vulnerability scan (web)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/mindburn-labs/pilot-web:${{ steps.tag.outputs.version }}
          format: sarif
          output: trivy-web-results.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload web Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web-results.sarif

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current tag (between ## [version] headers)
          version="${{ steps.tag.outputs.version }}"
          version="${version#v}"  # strip leading v
          awk "/^## \\[${version}\\]/{found=1; next} /^## \\[/{found=0} found" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${version}" > release-notes.md
          fi
          # Append image + attestation pointers
          cat >> release-notes.md <<EOF

          ---

          ### Docker Images

          \`\`\`
          docker pull ghcr.io/mindburn-labs/pilot:${{ steps.tag.outputs.version }}
          docker pull ghcr.io/mindburn-labs/pilot-web:${{ steps.tag.outputs.version }}
          \`\`\`

          Architectures: \`linux/amd64\`, \`linux/arm64\`

          ### Supply Chain

          - SBOM (CycloneDX): attached to this release + embedded in image
          - SLSA L3 provenance: attached via Sigstore / GitHub attestations
          - Vulnerabilities: scanned by Trivy (release blocked on CRITICAL/HIGH)

          Verify provenance:

          \`\`\`
          gh attestation verify --owner mindburn-labs oci://ghcr.io/mindburn-labs/pilot:${{ steps.tag.outputs.version }}
          \`\`\`
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            sbom.cdx.json
            trivy-results.sarif
            trivy-web-results.sarif
          generate_release_notes: false
