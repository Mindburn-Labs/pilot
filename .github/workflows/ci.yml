name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      production_smoke:
        description: 'Run smoke checks against a deployed production-like Pilot URL'
        required: false
        type: boolean
        default: false
      production_smoke_url:
        description: 'Pilot base URL for production smoke checks'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Release-quality gates
        run: npm run test:release

      - name: Test Coverage
        run: npx turbo test:coverage
        continue-on-error: true

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/*/coverage/
            packages/*/coverage/
            apps/*/coverage/
          retention-days: 14

  secrets-scan:
    name: Gitleaks — secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan commits

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="/tmp/gitleaks.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o "$archive"
          tar -C /tmp -xzf "$archive" gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks CLI
        run: gitleaks detect --source . --gitleaks-ignore-path .gitleaksignore --redact --no-banner --verbose

  license-audit:
    name: License audit (allowlisted only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run license check against allowlist
        run: npx tsx scripts/check-licenses.ts

  db-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: helm
          POSTGRES_PASSWORD: helm
          POSTGRES_DB: pilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared packages
        run: npx turbo build --filter=@pilot/db --filter=@pilot/shared

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://helm:helm@localhost:5432/pilot_test
        run: npm run db:push

      - name: Verify schema (pgvector + triggers + cost_usd)
        env:
          DATABASE_URL: postgresql://helm:helm@localhost:5432/pilot_test
        run: npx tsx scripts/verify-schema.ts

  e2e-integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Release E2E stack
        run: npm run test:e2e:local

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

  production-governance-smoke:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'workflow_dispatch' && inputs.production_smoke && inputs.production_smoke_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Production governance smoke
        env:
          API_URL: ${{ inputs.production_smoke_url }}
          HELM_FAIL_CLOSED: '1'
          SMOKE_TOKEN: ${{ secrets.PRODUCTION_SMOKE_TOKEN }}
          SMOKE_WORKSPACE_ID: ${{ vars.PRODUCTION_SMOKE_WORKSPACE_ID }}
          SMOKE_TASK_ID: ${{ vars.PRODUCTION_SMOKE_TASK_ID }}
        run: npm run smoke:production
