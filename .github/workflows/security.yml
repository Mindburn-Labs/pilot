name: security

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  owasp-llm-top10:
    name: OWASP LLM Top 10 regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build workspace packages
        run: npx turbo run build --filter='@pilot/shared' --filter='@pilot/mcp-server'
      - name: Run sanitizer unit tests
        run: npm test -w @pilot/shared -- src/__tests__/sanitizers.test.ts
      - name: Run OWASP LLM Top 10 regression suite
        run: npm test -w @pilot/shared -- src/__tests__/owasp-llm-top10.test.ts
      - name: Run MCP transport tests (injection vectors through MCP)
        run: npm test -w @pilot/shared -- src/__tests__/mcp-client.test.ts src/__tests__/mcp-registry.test.ts
      - name: Run MCP provider auth tests
        run: npm test -w @pilot/mcp-server -- src/__tests__/app.test.ts

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="/tmp/gitleaks.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o "$archive"
          tar -C /tmp -xzf "$archive" gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks CLI
        run: gitleaks detect --source . --gitleaks-ignore-path .gitleaksignore --redact --no-banner --verbose
